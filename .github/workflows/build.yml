name: Build Verification

on:
  pull_request:
    branches: [main]
    paths:
      - 'ScreenScribe/**'
      - 'Tests/**'
      - 'Build.xcconfig'
      - 'scripts/**'
      - '*.xcodeproj/**'
      - '.github/workflows/build.yml'
      - '.github/workflows/release.yml'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select latest stable Xcode
        run: scripts/select-latest-stable-xcode.sh

      - name: Create placeholder Secrets.plist
        run: |
          cat > ScreenScribe/Secrets.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          </dict>
          </plist>
          EOF

      - name: Run standalone regression checks
        run: scripts/run-standalone-tests.sh

      - name: Build
        run: |
          xcodebuild \
            -project ScreenScribe.xcodeproj \
            -scheme ScreenScribe \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build

      - name: Verify app bundle
        run: |
          APP_PATH="build/Build/Products/Release/ScreenScribe.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Could not find built app at $APP_PATH"
            exit 1
          fi
          echo "Build verification successful"
          echo "App bundle: $APP_PATH"
